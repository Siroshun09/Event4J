name: Deploy Javadoc to Cloudflare
on:
  workflow_dispatch:

jobs:
  deploy-javadoc:
    uses: Siroshun09/javadoc-page-template/.github/workflows/deploy-javadoc.yml@345afd55d7b87c11c62b0277fbbb973ba4b94ebf # main
    with:
      project_name: Event4J
      project_description: A simple event library for Java.
      custom_domain: javadoc.siroshun.dev
      javadocs_branch: javadoc
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
